<script>
/* ============================================================
 * ADMIN SHELL — Left Sidebar + Punch Entries + Employees
 * ============================================================ */

const ADMIN_NAV = [
  { key: 'admin-entries', label: 'Punch Entries', ic: '🕒' },
  { key: 'admin-employees', label: 'Employees', ic: '👥' }
];

function renderAdminShell() {
  const navHtml = ADMIN_NAV.map(n => `
    <div class="admin-nav-item ${S.page === n.key ? 'active' : ''}" data-action="nav" data-page="${n.key}">
      <span class="ic">${n.ic}</span>${n.label}
    </div>`).join('');

  let inner = '';
  if (S.page === 'admin-employees') inner = renderAdminEmployees();
  else inner = renderAdminEntries();

  const titleMap = { 'admin-entries': 'Punch Entries', 'admin-employees': 'Employees' };

  return `
  <div class="admin-shell">
    <div class="admin-sidebar ${S.sidebarOpen ? 'open' : ''}">
      <div class="brand"><div class="logo">SA</div><span>Smart Attendance</span></div>
      ${navHtml}
      <div class="admin-nav-item logout" data-action="logout"><span class="ic">🚪</span>Logout</div>
    </div>
    <div class="admin-main">
      <div class="admin-topbar">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="cursor:pointer;font-size:18px;display:none;" class="mobile-toggle" data-action="toggle-sidebar">☰</span>
          <h2>${titleMap[S.page] || 'Admin'}</h2>
        </div>
        <div class="who">Signed in as <b>${esc(S.user.name)}</b> (Admin)</div>
      </div>
      <div class="admin-content">${inner}</div>
    </div>
  </div>`;
}

/* ---------- Punch Entries ---------- */
async function loadAdminEntries() {
  if (!S.admin.employeesLoaded) await loadAdminEmployees();
  S.admin.entriesLoaded = false; render();
  try {
    const f = S.admin.filters;
    const res = await adminEntriesCall({ month: f.month, year: f.year, employeeId: f.employeeId, date: f.date });
    S.admin.entries = res;
  } catch (err) {
    showToast('Could not load punch entries: ' + err.message, true);
  }
  S.admin.entriesLoaded = true; render();
}
function adminEntriesCall(filters) {
  return new Promise((resolve, reject) => {
    google.script.run.withSuccessHandler(resolve).withFailureHandler(err => reject(new Error(err.message || String(err)))).getAdminPunchEntries(filters);
  });
}

function renderAdminEntries() {
  const f = S.admin.filters;
  const monthOpts = `<option value="-1" ${f.month === -1 ? 'selected' : ''}>All Months</option>` +
    MONTH_NAMES.map((m, i) => `<option value="${i}" ${i === f.month ? 'selected' : ''}>${m}</option>`).join('');
  const yearOpts = `<option value="-1" ${f.year === -1 ? 'selected' : ''}>All Years</option>` +
    currentYearOptions().map(y => `<option value="${y}" ${y === f.year ? 'selected' : ''}>${y}</option>`).join('');
  const empOpts = `<option value="">All Employees</option>` +
    S.admin.employees.map(e => `<option value="${esc(e.id)}" ${f.employeeId === e.id ? 'selected' : ''}>${esc(e.name)} (${esc(e.id)})</option>`).join('');

  let body;
  if (!S.admin.entriesLoaded) {
    body = `<div class="empty-state"><div class="spinner" style="margin:0 auto 12px;"></div>Loading entries…</div>`;
  } else if (!S.admin.entries.length) {
    body = `<div class="empty-state"><div class="big-ic">🗒️</div>No punch entries found for the selected filters.</div>`;
  } else {
    body = `<div class="table-wrap"><div class="table-scroll"><table class="att-table">
      <thead><tr><th>Date</th><th>Employee</th><th>Punch In</th><th>Punch Out</th><th>Hours</th><th>Late</th><th>Early</th><th>Selfie</th><th>Action</th></tr></thead>
      <tbody>${S.admin.entries.map((r, i) => `
        <tr>
          <td>${esc(r.date)}</td>
          <td>${esc(r.empName)} <span style="color:var(--ink-2);font-size:11px;">(${esc(r.empId)})</span></td>
          <td class="${isLateVal(r.lateIn) ? 'red' : ''}">${esc(r.punchIn || '--')}</td>
          <td class="${isLateVal(r.earlyOut) ? 'red' : ''}">${esc(r.punchOut || '--')}</td>
          <td>${esc(r.workingHours || '--')}</td>
          <td class="${isLateVal(r.lateIn) ? 'red' : 'green'}">${esc(r.lateIn || '--')}</td>
          <td class="${isLateVal(r.earlyOut) ? 'red' : 'green'}">${esc(r.earlyOut || '--')}</td>
          <td>${r.selfieIn ? `<img class="avatar-sm" src="${esc(r.selfieIn)}" data-action="preview-photo" data-url="${esc(r.selfieIn)}">` : '—'}</td>
          <td><button class="link-btn" data-action="view-entry" data-idx="${i}">View</button></td>
        </tr>`).join('')}</tbody>
    </table></div></div>`;
  }

  return `
    <div class="filter-bar">
      <select data-action="adm-month">${monthOpts}</select>
      <select data-action="adm-year">${yearOpts}</select>
      <select data-action="adm-emp">${empOpts}</select>
    </div>
    ${body}
    ${renderViewEntryModal()}`;
}

function openViewEntry(idxStr) {
  const idx = parseInt(idxStr, 10);
  S.admin.viewEntry = S.admin.entries[idx] || null;
  render();
}

function renderViewEntryModal() {
  const r = S.admin.viewEntry; if (!r) return '';
  const mapLink = (lat, lng) => (lat && lng) ? `https://www.google.com/maps?q=${lat},${lng}` : '';
  return `
  <div class="overlay" data-action="view-entry-overlay">
    <div class="detail-modal">
      <div class="dm-head"><h3>Attendance Details — ${esc(r.date)}</h3><span class="close-x" style="cursor:pointer;" data-action="close-view-entry">✕</span></div>
      <div class="dm-body">
        <div class="selfie-pair">
          <div class="box">
            ${r.selfieIn ? `<img src="${esc(r.selfieIn)}" data-action="preview-photo" data-url="${esc(r.selfieIn)}">` : `<div style="aspect-ratio:1/1;background:#F1F5F9;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);">No Photo</div>`}
            <div class="cap">Punch In Selfie</div>
          </div>
          <div class="box">
            ${r.selfieOut ? `<img src="${esc(r.selfieOut)}" data-action="preview-photo" data-url="${esc(r.selfieOut)}">` : `<div style="aspect-ratio:1/1;background:#F1F5F9;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);">No Photo</div>`}
            <div class="cap">Punch Out Selfie</div>
          </div>
        </div>
        <div class="detail-row"><span class="k">Employee</span><span class="v">${esc(r.empName)} (${esc(r.empId)})</span></div>
        <div class="detail-row"><span class="k">Punch In</span><span class="v">${esc(r.punchIn || '--')}</span></div>
        <div class="detail-row"><span class="k">Punch Out</span><span class="v">${esc(r.punchOut || '--')}</span></div>
        <div class="detail-row"><span class="k">Working Hours</span><span class="v">${esc(r.workingHours || '--')}</span></div>
        <div class="detail-row"><span class="k">Late In</span><span class="v ${isLateVal(r.lateIn) ? 'red' : ''}">${esc(r.lateIn || '--')}</span></div>
        <div class="detail-row"><span class="k">Early Out</span><span class="v ${isLateVal(r.earlyOut) ? 'red' : ''}">${esc(r.earlyOut || '--')}</span></div>
        <div class="detail-row"><span class="k">Address (In)</span><span class="v">${esc(r.addrIn || '--')}</span></div>
        <div class="detail-row"><span class="k">Address (Out)</span><span class="v">${esc(r.addrOut || '--')}</span></div>
        <div style="display:flex;gap:14px;margin-top:8px;">
          ${mapLink(r.latIn, r.lngIn) ? `<a class="map-link" href="${mapLink(r.latIn, r.lngIn)}" target="_top">📍 View In-Location on Map</a>` : ''}
        </div>
        <div style="display:flex;gap:14px;">
          ${mapLink(r.latOut, r.lngOut) ? `<a class="map-link" href="${mapLink(r.latOut, r.lngOut)}" target="_top">📍 View Out-Location on Map</a>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

/* ---------- Employees ---------- */
async function loadAdminEmployees() {
  try {
    const res = await runServer('getEmployees');
    S.admin.employees = res; S.admin.employeesLoaded = true;
  } catch (err) {
    showToast('Could not load employees: ' + err.message, true);
  }
  render();
}

function renderAdminEmployees() {
  const rows = S.admin.employees;
  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
      <button class="btn btn-primary" data-action="open-add-employee">+ Add Employee</button>
    </div>
    <div class="table-wrap"><div class="table-scroll"><table class="att-table">
      <thead><tr><th>Employee ID</th><th>Name</th><th>Department</th><th>Role</th><th>Status</th></tr></thead>
      <tbody>${rows.length ? rows.map(e => `
        <tr>
          <td>${esc(e.id)}</td><td>${esc(e.name)}</td><td>${esc(e.department || '--')}</td>
          <td>${esc(e.role)}</td>
          <td>${e.active ? '<span class="badge present">Active</span>' : '<span class="badge absent">Inactive</span>'}</td>
        </tr>`).join('') : `<tr><td colspan="5"><div class="empty-state">No employees yet.</div></td></tr>`}</tbody>
    </table></div></div>
    ${renderAddEmployeeModal()}`;
}

function openAddEmployee() {
  S.admin.addEmpOpen = true;
  S.admin.addEmpForm = { id: '', name: '', department: '', role: 'Employee', password: '' };
  S.admin.addEmpError = '';
  render();
}

function renderAddEmployeeModal() {
  if (!S.admin.addEmpOpen) return '';
  const f = S.admin.addEmpForm;
  return `
  <div class="overlay" data-action="add-employee-overlay">
    <div class="modal-card">
      <div class="mc-head"><h3>Add New Employee</h3><span class="close-x" style="cursor:pointer;" data-action="close-add-employee">✕</span></div>
      <div class="mc-body">
        ${S.admin.addEmpError ? `<div class="login-error">${esc(S.admin.addEmpError)}</div>` : ''}
        <form id="addEmpForm">
          <div class="field"><label>Employee ID</label><input type="text" data-emp-field="id" value="${esc(f.id)}" placeholder="e.g. EMP002" required></div>
          <div class="field"><label>Name</label><input type="text" data-emp-field="name" value="${esc(f.name)}" placeholder="Full Name" required></div>
          <div class="field"><label>Department</label><input type="text" data-emp-field="department" value="${esc(f.department)}" placeholder="e.g. Operations"></div>
          <div class="field"><label>Role</label>
            <select data-emp-field="role">
              <option value="Employee" ${f.role === 'Employee' ? 'selected' : ''}>Employee</option>
              <option value="Admin" ${f.role === 'Admin' ? 'selected' : ''}>Admin</option>
            </select>
          </div>
          <div class="field"><label>Password</label><input type="password" data-emp-field="password" value="${esc(f.password)}" placeholder="Set a login password" required></div>
        </form>
      </div>
      <div class="mc-foot">
        <button class="btn btn-ghost" data-action="close-add-employee">Cancel</button>
        <button class="btn btn-primary" data-action="save-add-employee" ${S.admin.addEmpSaving ? 'disabled' : ''}>${S.admin.addEmpSaving ? '<span class="spinner spinner-sm"></span> Saving…' : 'Save Employee'}</button>
      </div>
    </div>
  </div>`;
}

async function submitAddEmployee() {
  const f = S.admin.addEmpForm; if (!f) return;
  if (!f.id.trim() || !f.name.trim() || !f.password.trim()) {
    S.admin.addEmpError = 'Employee ID, Name and Password are required.'; render(); return;
  }
  S.admin.addEmpSaving = true; S.admin.addEmpError = ''; render();
  try {
    const res = await runServer('addEmployee', f);
    S.admin.addEmpSaving = false;
    if (res.status !== 'ok') { S.admin.addEmpError = res.message || 'Save failed.'; render(); return; }
    S.admin.addEmpOpen = false;
    await loadAdminEmployees();
    showToast('Employee added successfully.', false);
  } catch (err) {
    S.admin.addEmpSaving = false; S.admin.addEmpError = err.message; render();
  }
}
</script>
