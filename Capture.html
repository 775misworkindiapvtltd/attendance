<script>
/* ============================================================
 * SELFIE + GPS CAPTURE FLOW
 * Shared modal used for both Punch In and Punch Out.
 * Enforces: camera permission, GPS permission, photo captured — before "Confirm & Submit" is enabled.
 * ============================================================ */

function openCapture(type) {
  if (type === 'IN' && S.today.punchedIn) { showToast('You have already punched in today.', true); return; }
  if (type === 'OUT' && (!S.today.punchedIn || S.today.punchedOut)) {
    showToast(!S.today.punchedIn ? 'Please Punch In first.' : 'You have already punched out today.', true);
    return;
  }
  S.capture = {
    type: type,
    gpsStatus: 'pending', gpsError: '', lat: null, lng: null,
    camReady: false, camError: '', photoDataUrl: null, stream: null
  };
  render();
  startCamera();
  requestGPS();
}

function closeCapture() {
  stopCamera();
  S.capture = null;
  const el = document.getElementById('captureOverlay'); if (el) el.remove();
}

function requestGPS() {
  if (!S.capture) return;
  S.capture.gpsStatus = 'pending'; S.capture.gpsError = ''; renderCaptureOverlay();
  if (!navigator.geolocation) {
    S.capture.gpsStatus = 'fail'; S.capture.gpsError = 'Geolocation not supported on this device/browser.';
    renderCaptureOverlay(); return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      if (!S.capture) return;
      S.capture.gpsStatus = 'ok';
      S.capture.lat = pos.coords.latitude;
      S.capture.lng = pos.coords.longitude;
      renderCaptureOverlay();
    },
    err => {
      if (!S.capture) return;
      S.capture.gpsStatus = 'fail';
      S.capture.gpsError = (err.code === 1)
        ? 'Location permission denied. Please allow location access in your browser settings and retry.'
        : 'Could not fetch location. Please check your GPS/network and retry.';
      renderCaptureOverlay();
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

async function startCamera() {
  if (!S.capture) return;
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      S.capture.camError = 'Camera not supported on this device/browser.'; renderCaptureOverlay(); return;
    }
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    if (!S.capture) { stream.getTracks().forEach(t => t.stop()); return; }
    S.capture.stream = stream; S.capture.camReady = true; S.capture.camError = '';
    renderCaptureOverlay();
    const video = document.getElementById('camVideo');
    if (video) { video.srcObject = stream; video.play().catch(() => {}); }
  } catch (err) {
    if (!S.capture) return;
    S.capture.camError = 'Camera permission denied. Please allow camera access in your browser settings and retry.';
    renderCaptureOverlay();
  }
}

function stopCamera() {
  if (S.capture && S.capture.stream) { S.capture.stream.getTracks().forEach(t => t.stop()); S.capture.stream = null; }
}

function takePhoto() {
  const video = document.getElementById('camVideo'); if (!video || !S.capture) return;
  const canvas = document.createElement('canvas');
  const size = Math.min(video.videoWidth || 480, video.videoHeight || 480);
  canvas.width = 480; canvas.height = 480;
  const ctx = canvas.getContext('2d');
  const sx = (video.videoWidth - size) / 2, sy = (video.videoHeight - size) / 2;
  ctx.drawImage(video, sx, sy, size, size, 0, 0, 480, 480);
  S.capture.photoDataUrl = canvas.toDataURL('image/jpeg', 0.72);
  stopCamera();
  S.capture.camReady = false;
  renderCaptureOverlay();
}

function retakePhoto() {
  if (!S.capture) return;
  S.capture.photoDataUrl = null;
  startCamera();
}

function canSubmitCapture() {
  const c = S.capture; if (!c) return false;
  return c.gpsStatus === 'ok' && !!c.photoDataUrl && !S.submitting;
}

async function submitPunch() {
  const c = S.capture; if (!c) return;
  if (c.gpsStatus !== 'ok') { showToast('Location permission required. Attendance cannot be marked without GPS.', true); return; }
  if (!c.photoDataUrl) { showToast('Please capture a selfie before submitting.', true); return; }

  S.submitting = true; renderCaptureOverlay();
  const payload = {
    employeeId: S.user.id,
    employeeName: S.user.name,
    lat: c.lat, lng: c.lng,
    selfieBase64: c.photoDataUrl,
    device: navigator.platform || 'Unknown',
    browser: (navigator.userAgent || '').substring(0, 120)
  };
  try {
    const res = (c.type === 'IN') ? await runServer('punchIn', payload) : await runServer('punchOut', payload);
    S.submitting = false;
    if (res.status !== 'ok') { showToast(res.message || 'Something went wrong.', true); renderCaptureOverlay(); return; }
    if (c.type === 'IN') {
      S.today.punchedIn = true; S.today.punchInTime = res.punchInTime;
      showToast(res.late ? `Punched In at ${res.punchInTime} (${res.lateBy})` : `Punched In successfully at ${res.punchInTime}`, false);
    } else {
      S.today.punchedOut = true; S.today.punchOutTime = res.punchOutTime;
      showToast(res.early ? `Punched Out at ${res.punchOutTime} (${res.earlyBy})` : `Punched Out successfully at ${res.punchOutTime}`, false);
    }
    closeCapture();
    render();
  } catch (err) {
    S.submitting = false;
    showToast('Submit failed: ' + err.message, true);
    renderCaptureOverlay();
  }
}

function renderCaptureOverlay() {
  let el = document.getElementById('captureOverlay');
  const c = S.capture;
  if (!c) { if (el) el.remove(); return; }
  if (!el) { el = document.createElement('div'); el.id = 'captureOverlay'; document.body.appendChild(el); }
  el.className = 'overlay';

  const gpsHtml = c.gpsStatus === 'ok'
    ? `<div class="gps-status ok"><span class="dot2"></span>Location captured successfully</div>`
    : c.gpsStatus === 'fail'
      ? `<div class="gps-status fail"><span class="dot2"></span>${esc(c.gpsError)} <button class="link-btn" style="margin-left:auto;" data-action="retry-gps">Retry</button></div>`
      : `<div class="gps-status pending"><span class="dot2"></span>Fetching your location…</div>`;

  let camHtml = '';
  if (c.photoDataUrl) {
    camHtml = `<div class="cam-frame"><img src="${c.photoDataUrl}" alt="Selfie preview"></div>
      <div class="cam-actions"><button class="btn btn-ghost btn-block" data-action="retake-photo">🔄 Retake</button></div>`;
  } else if (c.camError) {
    camHtml = `<div class="cam-frame" style="display:flex;align-items:center;justify-content:center;color:#F87171;font-size:12.5px;text-align:center;padding:16px;">${esc(c.camError)}</div>
      <div class="cam-actions"><button class="btn btn-ghost btn-block" data-action="retake-photo">🔄 Try Again</button></div>`;
  } else {
    camHtml = `<div class="cam-frame"><video id="camVideo" autoplay playsinline muted></video></div>
      <div class="cam-actions"><button class="btn btn-primary btn-block" onclick="takePhoto()" ${c.camReady ? '' : 'disabled'}>📸 Capture Selfie</button></div>`;
  }

  el.innerHTML = `
    <div class="capture-card">
      <div class="capture-head">
        <h3>${c.type === 'IN' ? '🟢 Punch In' : '🔴 Punch Out'}</h3>
        <span class="close-x" data-action="close-capture">✕</span>
      </div>
      <div class="capture-body">
        ${gpsHtml}
        ${camHtml}
        <button class="btn ${c.type === 'IN' ? 'btn-success' : 'btn-danger'} btn-block" style="margin-top:14px;"
          data-action="confirm-submit" ${canSubmitCapture() ? '' : 'disabled'}>
          ${S.submitting ? '<span class="spinner spinner-sm"></span> Submitting…' : (c.type === 'IN' ? '✔ Confirm Punch In' : '✔ Confirm Punch Out')}
        </button>
        <div class="punch-hint">Selfie aur Location dono zaroori hain. Inke bina submit nahi hoga.</div>
      </div>
    </div>`;

  // Re-attach the live video stream to the freshly-created <video> element, if camera already active.
  if (!c.photoDataUrl && c.stream) {
    const video = document.getElementById('camVideo');
    if (video && video.srcObject !== c.stream) { video.srcObject = c.stream; video.play().catch(() => {}); }
  }
}

function renderPhotoPreviewOverlay() {
  let el = document.getElementById('photoPreviewOverlay');
  if (!S.photoPreviewUrl) { if (el) el.remove(); return; }
  if (!el) { el = document.createElement('div'); el.id = 'photoPreviewOverlay'; document.body.appendChild(el); }
  el.className = 'photo-preview';
  el.innerHTML = `<span class="close-x" data-action="close-photo-preview">✕</span><img src="${esc(S.photoPreviewUrl)}" alt="Photo preview">`;
  el.onclick = function (e) { if (e.target === el) { S.photoPreviewUrl = null; render(); } };
}
</script>
