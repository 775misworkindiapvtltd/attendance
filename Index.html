<body>
<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,Arial,sans-serif;color:#6B7280;">
    Loading Attendance System…
  </div>
</div>

<!--
  Watchdog: runs independently of AppScript.html. If AppScript.html's script
  fails to parse/execute (e.g. corrupted during copy-paste) or never sets
  window.__appBooted, the app would otherwise be a permanently blank/stuck
  page with no clue why. This shows a clear diagnostic instead.
-->
<script>
  window.addEventListener('error', function (e) {
    if (window.__appBooted) return; // app already started fine, ignore later runtime errors here
    showBootFailure_(e && e.message ? e.message : 'Unknown script error');
  });
  // IMPORTANT: boot() in AppScript.html is an async function. If it throws
  // (e.g. inside render()), that becomes an "unhandledrejection", NOT a
  // regular "error" event — the listener above alone would never catch it,
  // which is exactly why this page could go blank with "no error thrown".
  window.addEventListener('unhandledrejection', function (e) {
    if (window.__appBooted) return;
    var reason = e && e.reason;
    var msg = (reason && reason.message) ? reason.message : String(reason || 'Unknown promise rejection');
    var stack = (reason && reason.stack) ? ('\n' + reason.stack) : '';
    showBootFailure_(msg + stack);
  });
  setTimeout(function () {
    if (window.__appBooted) return;
    if (typeof window.bootApp !== 'function') {
      // The most common real-world cause: AppScript.html (it's a large file,
      // ~900 lines) got cut off partway through when it was copy-pasted into
      // the Apps Script editor. Everything above the cut point still saved
      // and parsed fine (so no syntax error), but bootApp() — defined near
      // the very end of the file — never made it in, so it doesn't exist.
      showBootFailure_(
        'bootApp() is not defined. This means AppScript.html was pasted incompletely — ' +
        'most likely the copy-paste got cut off before reaching the end of that file ' +
        '(it is a large file, so this is the #1 cause of this exact error).'
      );
      return;
    }
    showBootFailure_('The app script did not finish starting in time (no error was thrown, but nothing loaded).');
  }, 6000);
  function showBootFailure_(details) {
    var app = document.getElementById('app');
    if (!app || app.getAttribute('data-boot-failed')) return;
    app.setAttribute('data-boot-failed', '1');
    app.innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;' +
      'background:linear-gradient(135deg,#0F172A 0%,#1E3A8A 45%,#2563EB 100%);font-family:system-ui,Arial,sans-serif;">' +
      '<div style="background:#fff;max-width:480px;border-radius:16px;padding:28px 26px;box-shadow:0 24px 60px -12px rgba(0,0,0,.4);">' +
      '<h1 style="font-size:18px;margin:0 0 12px;color:#B91C1C;">⚠️ App failed to load</h1>' +
      '<p style="font-size:13.5px;line-height:1.6;color:#374151;margin:0 0 12px;">' +
      'The AppScript.html file\'s JavaScript did not run correctly. This is usually caused by a corrupted or partial copy-paste into the Apps Script editor.</p>' +
      '<div style="background:#FEF2F2;color:#B91C1C;border-radius:10px;padding:10px 12px;font-size:11.5px;font-family:monospace;white-space:pre-wrap;word-break:break-word;margin-bottom:14px;">' +
      String(details).replace(/</g, '&lt;') + '</div>' +
      '<p style="font-size:12.5px;color:#374151;line-height:1.7;">' +
      '<b>Fix:</b> Open <code>AppScript.html</code> on GitHub, click "Raw", select all &amp; copy. ' +
      'In Apps Script, open AppScript.html, select all existing content and delete it completely, ' +
      'then paste the fresh copy. Save, then Deploy → Manage deployments → Edit → New version → Deploy.</p>' +
      '<button onclick="location.reload()" style="margin-top:8px;background:#2563EB;color:#fff;border:none;' +
      'border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;">Reload Page</button>' +
      '</div></div>';
  }
</script>

<?!= include('AppScript') ?>

<script>
  // Explicitly start the app now that AppScript.html has been included above.
  // If AppScript.html was truncated during copy-paste, bootApp will be
  // undefined here and this throws immediately (caught by the 'error'
  // listener above) instead of silently hanging for 6 seconds.
  if (typeof bootApp === 'function') {
    bootApp();
  } else {
    showBootFailure_(
      'bootApp() is not defined right after loading AppScript.html. This means AppScript.html ' +
      'was pasted incompletely into the Apps Script editor — most likely the copy-paste got cut ' +
      'off before reaching the end of that file (it is a large file, so this is the #1 cause of this error).'
    );
  }
</script>
</body>
</html>
